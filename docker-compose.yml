version: '3.9'
services:
  web:
    build: .
    command: python -m bot.main
    volumes:
      - .:/app
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      DATABASE_URL: postgres://postgres:postgres@db:5432/sparly
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: sparly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    volumes:
      - redis-data:/data

volumes:
  db-data:
  redis-data:
